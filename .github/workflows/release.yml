name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Create updater archive + sign + release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_MACOS="src-tauri/target/aarch64-apple-darwin/release/bundle/macos"
          BUNDLE_DMG="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"

          echo "=== Bundle contents ==="
          ls -la "$BUNDLE_MACOS"
          ls -la "$BUNDLE_DMG"

          # Manually create .app.tar.gz buat updater
          cd "$BUNDLE_MACOS"
          tar -czf "Emen-Kanban.app.tar.gz" "Emen-Kanban.app"
          cd -

          TAR_FILE="$BUNDLE_MACOS/Emen-Kanban.app.tar.gz"

          # Sign pake env var TAURI_SIGNING_PRIVATE_KEY (auto-detected)
          cargo tauri signer sign \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$TAR_FILE"

          SIG_FILE="$TAR_FILE.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "❌ Sig gak ke-generate"
            ls -la "$BUNDLE_MACOS"
            exit 1
          fi

          # Stage assets
          STAGE_DIR="/tmp/release-stage"
          mkdir -p "$STAGE_DIR"

          DMG_FILE=$(ls "$BUNDLE_DMG"/*.dmg | head -1)
          DMG_NAME="Emen-Kanban_${VERSION}_aarch64.dmg"
          TAR_NAME="Emen-Kanban_aarch64.app.tar.gz"
          SIG_NAME="Emen-Kanban_aarch64.app.tar.gz.sig"

          cp "$DMG_FILE" "$STAGE_DIR/$DMG_NAME"
          cp "$TAR_FILE" "$STAGE_DIR/$TAR_NAME"
          cp "$SIG_FILE" "$STAGE_DIR/$SIG_NAME"

          # Generate latest.json
          SIG_CONTENT=$(cat "$SIG_FILE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${TAR_NAME}"

          cat > "$STAGE_DIR/latest.json" <<EOF
          {
            "version": "${VERSION}",
            "notes": "Update v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_CONTENT}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

          echo "=== latest.json ==="
          cat "$STAGE_DIR/latest.json"

          # Create release
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "Emen Kanban $GITHUB_REF_NAME" \
              --notes "Auto-generated release. App existing bakal auto-detect update."
          fi

          # Upload semua
          gh release upload "$GITHUB_REF_NAME" \
            "$STAGE_DIR/$DMG_NAME" \
            "$STAGE_DIR/$TAR_NAME" \
            "$STAGE_DIR/$SIG_NAME" \
            "$STAGE_DIR/latest.json" \
            --clobber

          echo "✅ Done — release $GITHUB_REF_NAME live with all assets"
